<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VS Arena — Weapon Battle Simulator</title>
  <meta name="description" content="Run the viral weapon battle simulations yourself. Pick two of 11 fighters, watch physics decide, share the exact battle with a link.">
  <meta name="theme-color" content="#0d0f1a">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
  <!-- link previews (Reddit / Discord / KakaoTalk / X) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VS Arena">
  <meta property="og:title" content="VS Arena — Weapon Battle Simulator">
  <meta property="og:description" content="Run the viral weapon battle sims yourself. 11 fighters, real physics, and share links that replay the exact same battle.">
  <meta property="og:url" content="https://nohseongmin.github.io/vs-arena/">
  <meta property="og:image" content="https://nohseongmin.github.io/vs-arena/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="VS Arena — Weapon Battle Simulator">
  <meta name="twitter:description" content="Pick two fighters. Physics decides. Share the exact battle with a link.">
  <meta name="twitter:image" content="https://nohseongmin.github.io/vs-arena/og.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⚔️ VS ARENA</h1>
    <p class="tagline">1v1 or 6-way royale. Run the sim. Share the battle.</p>
  </header>

  <main>
    <div id="stage">
      <canvas id="game" width="405" height="720"></canvas>
      <div id="overlay" class="hidden">
        <div class="winner-emoji" id="winnerEmoji"></div>
        <div class="winner-text" id="winnerText"></div>
        <div class="overlay-buttons">
          <button id="btnReplay" class="btn secondary">🔁 Replay</button>
          <button id="btnRematch" class="btn primary">⚔️ Rematch</button>
          <button id="btnShareOverlay" class="btn secondary">🔗 Share</button>
        </div>
      </div>
    </div>

    <section id="controls">
      <div class="mode-tabs">
        <button id="tabDuel" class="mode-tab active">⚔️ 1V1 DUEL</button>
        <button id="tabRoyale" class="mode-tab">👑 BATTLE ROYALE</button>
      </div>

      <div id="duelPickers">
        <div class="picker-row">
          <div class="picker" id="pickerA">
            <div class="picker-label side-a">FIGHTER 1</div>
            <div class="weapon-grid" id="gridA"></div>
          </div>
          <div class="vs-label">VS</div>
          <div class="picker" id="pickerB">
            <div class="picker-label side-b">FIGHTER 2</div>
            <div class="weapon-grid" id="gridB"></div>
          </div>
        </div>
      </div>

      <div id="royalePickers" class="hidden">
        <div class="royale-head">
          <span class="picker-label">TAP TO ADD (2–6) · <span id="royaleCount">4 fighters</span></span>
          <button id="btnRandomRoster" class="btn tiny">🎲 Random</button>
        </div>
        <div class="weapon-grid roster-grid" id="gridRoyale"></div>
      </div>

      <div class="sliders">
        <label>HP <span id="hpVal">100</span>
          <input type="range" id="hp" min="50" max="300" step="10" value="100">
        </label>
        <label>Speed <span id="spdVal">1.0</span>x
          <input type="range" id="spd" min="0.5" max="3" step="0.1" value="1">
        </label>
        <label class="seed-label">Seed
          <span class="seed-wrap">
            <input type="number" id="seed" min="0" max="4294967295">
            <button id="btnDice" class="btn tiny" title="Random seed">🎲</button>
          </span>
        </label>
      </div>

      <div class="action-row">
        <button id="btnFight" class="btn primary big">▶ FIGHT</button>
        <button id="btnShare" class="btn secondary big">🔗 Copy Link</button>
        <button id="btnMute" class="btn secondary" title="Sound on/off">🔊</button>
      </div>
    </section>

    <div class="ad-slot">AD SLOT (reserved)</div>
  </main>

  <footer>
    <p>Same seed = same battle. Share a link, your friend sees the exact fight.</p>
  </footer>

  <div id="toast" class="hidden"></div>
  <script src="game.js?v=11"></script>
  <!-- GoatCounter analytics (privacy-friendly, no cookies) -->
  <script data-goatcounter="https://nohseongmin.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
